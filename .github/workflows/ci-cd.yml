name: CI-CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast tripwire: committed conflict markers have reached main twice via
  # dirty-workspace commits. Fails in seconds, before the expensive job.
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject committed conflict markers
        run: |
          set -e
          # Look for full 7-char markers at line start in tracked text files.
          # Excludes this workflow itself and lockfiles.
          MATCHES=$(git grep -nIE '^(<{7}|>{7}|={7})( |$)' -- \
            ':!*.lock' ':!package-lock.json' ':!.github/workflows/ci-cd.yml' \
            || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Committed merge conflict markers found:"
            echo "$MATCHES"
            exit 1
          fi
          echo "No conflict markers. Clean."

      - name: Reject dirty-tree sweep artifacts
        run: |
          set -e
          # Pasted-prompt files and other workspace droppings that have been
          # accidentally committed before.
          BAD=$(git ls-files | grep -E '(^|/)Pasted-.*\.txt$|REPLIT_PULL_TODAY\.md$' || true)
          if [ -n "$BAD" ]; then
            echo "::error::Workspace sweep artifacts committed:"
            echo "$BAD"
            exit 1
          fi
          echo "No sweep artifacts. Clean."

      - name: Reject committed PII exports
        run: bash scripts/check-no-pii.sh

  build-test:
    needs: hygiene
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: realist_idx
          POSTGRES_USER: realist
          POSTGRES_PASSWORD: realist
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U realist -d realist_idx"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://realist:realist@localhost:5432/realist_idx
      DDF_USERNAME: test-user
      DDF_PASSWORD: test-password
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate

      - name: Run type check
        run: npm run type-check

      - name: Run lint
        run: npm run idx:lint

      - name: Run tests with coverage
        run: npm run idx:test

      - name: Run unit tests (vitest)
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # Playwright smoke pack — the only job that runs the app in a real browser.
  # Runs in parallel with build-test (both need only hygiene). The postgres
  # service uses the postgis image because shared/schema.ts declares PostGIS
  # geometry columns; e2e/global-setup.ts pushes the schema, boots the
  # production bundle, and tears it down. See e2e/README.md.
  e2e:
    needs: hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: realist_e2e
          POSTGRES_USER: realist
          POSTGRES_PASSWORD: realist
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U realist -d realist_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://realist:realist@localhost:5432/realist_e2e
      # Only boot-required secret; any value works (nothing in the smoke
      # pack authenticates a session).
      SESSION_SECRET: e2e-ci-smoke-session-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      # Playwright transpiles specs without type-checking; this step is the
      # only place e2e/tsconfig.json is actually enforced.
      - name: Typecheck E2E specs
        run: npx tsc -p e2e --noEmit

      - name: Build
        run: npm run build

      # Global setup pushes the drizzle schema, boots dist/index.cjs in the
      # background, and waits for / to answer 200 before any test runs.
      - name: Run E2E smoke pack
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build-test, e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Placeholder deploy step
        run: echo "Configure production deployment target (Replit/VM/Kubernetes) here."
