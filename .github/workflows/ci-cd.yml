name: CI-CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: realist_idx
          POSTGRES_USER: realist
          POSTGRES_PASSWORD: realist
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U realist -d realist_idx"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://realist:realist@localhost:5432/realist_idx
      DDF_USERNAME: test-user
      DDF_PASSWORD: test-password
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate

      - name: Run type check
        run: npm run type-check

      - name: Run lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test

      - name: Build
        run: npm run build

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Placeholder deploy step
        run: echo "Configure production deployment target (Replit/VM/Kubernetes) here."
